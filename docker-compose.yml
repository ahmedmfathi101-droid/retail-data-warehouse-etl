x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.8.1}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    _PIP_ADDITIONAL_REQUIREMENTS: -r /opt/airflow/requirements.txt
    DW_CONN_STR: postgresql+psycopg2://dw_user:dw_pass@postgres/retail_dw
    DQ_MIN_ROWS: ${DQ_MIN_ROWS:-1}
    DATA_FRESHNESS_MAX_HOURS: ${DATA_FRESHNESS_MAX_HOURS:-30}
    SCRAPE_SEARCH_TERMS: ${SCRAPE_SEARCH_TERMS:-laptop,tablet,ipad,android tablet,samsung tablet,lenovo tablet,huawei tablet,xiaomi tablet,smartphone,mobile phone,android phone,iphone,samsung phone,xiaomi phone,redmi phone,oppo phone,realme phone,infinix phone,tecno phone,nokia phone,honor phone,huawei phone,oneplus phone,feature phone,foldable phone}
    SCRAPE_SEARCH_PAGES: ${SCRAPE_SEARCH_PAGES:-2}
    SCRAPE_DETAIL_PAGES: ${SCRAPE_DETAIL_PAGES:-true}
    SCRAPE_DETAIL_LIMIT_PER_RUN: ${SCRAPE_DETAIL_LIMIT_PER_RUN:-300}
    SCRAPE_DETAIL_DELAY_MIN_SECONDS: ${SCRAPE_DETAIL_DELAY_MIN_SECONDS:-2}
    SCRAPE_DETAIL_DELAY_MAX_SECONDS: ${SCRAPE_DETAIL_DELAY_MAX_SECONDS:-5}
    SCRAPE_MERGE_WITH_EXISTING_RAW: ${SCRAPE_MERGE_WITH_EXISTING_RAW:-true}
    SNOWFLAKE_ENABLED: ${SNOWFLAKE_ENABLED:-false}
    SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT:-}
    SNOWFLAKE_USER: ${SNOWFLAKE_USER:-}
    SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD:-}
    SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-}
    SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE:-}
    SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-PUBLIC}
    SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./src:/opt/airflow/src
    - ./sql:/opt/airflow/sql
    - ./data:/opt/airflow/data
    - ./requirements.txt:/opt/airflow/requirements.txt
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
      POSTGRES_MULTIPLE_DATABASES: "retail_dw" # We will use an init script to create the DW DB
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./sql/init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
      - ./sql/create_tables.sql:/tmp/create_tables.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
